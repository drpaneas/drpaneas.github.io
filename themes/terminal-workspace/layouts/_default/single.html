{{ define "main" }}
  <article class="pane article-pane">
    {{ partial "breadcrumb.html" . }}
    <div class="pane-title">article / {{ .File.LogicalName }}</div>
    <h1>{{ .Title }}</h1>
    {{ partial "post_meta.html" . }}
    <div class="post-content">
      {{ .Content }}
    </div>
  </article>
{{ end }}
